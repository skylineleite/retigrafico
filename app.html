<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Retigráfico - AutoSave</title>
  <link rel="manifest" href="manifest.webmanifest?v=7">
  <meta name="theme-color" content="#f8fafc">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  
  <style>
    :root{--ok:#8BC34A;--mid:#FFEB3B;--bad:#F44336;--worse:#9C27B0;--dead:#212121;--yes:#F44336;--no:#8BC34A;--ink:#020617;--muted:#64748b;--brand:#0ea5e9;--bg:#f8fafc;--card:#ffffff;--radius:16px;}
    *{box-sizing:border-box} 
    body{font-family:system-ui,sans-serif;margin:0;background:var(--bg);color:var(--ink);padding-bottom:40px;}
    .wrap{max-width:1200px;margin:18px auto;padding:0 12px}
    header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;}
    .btn-back{background:transparent;border:1px solid #cbd5e1;color:var(--muted);padding:8px 12px;border-radius:10px;font-weight:600;cursor:pointer;}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);padding:16px;border:1px solid #e2e8f0;margin-bottom:12px;}
    .grid{display:grid;gap:10px} .g-3{grid-template-columns:repeat(3,1fr)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    input,button,select{padding:12px;border-radius:12px;border:1px solid #cbd5e1;font-size:16px;outline:none;}
    input[type=number],input[type=text],select{width:100%;}
    input[type=checkbox]{width:20px;height:20px;accent-color:var(--brand);cursor:pointer;}
    button{background:var(--brand);color:#fff;border:none;cursor:pointer;font-weight:600;}
    button.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand);}
    button.warn{background:#fff;color:#d97706;border:1px solid #d97706;}
    button.danger{background:#fee2e2;color:#ef4444;border:1px solid #ef4444;}
    .params-box{background:#f1f5f9;padding:16px;border-radius:12px;margin-top:10px;}
    .check-list{display:flex;flex-direction:column;gap:12px;}
    .check-row{display:flex;align-items:center;gap:12px;cursor:pointer;padding:4px 0;font-weight:500;}
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100;}
    .modal-card{background:#fff;padding:24px;border-radius:16px;width:340px;text-align:center;}
    .hidden{display:none;}
    .table-wrap{max-height:600px;overflow:auto;border-radius:12px;border:1px solid #e2e8f0;margin-top:12px;}
    table{border-collapse:separate;border-spacing:0;width:100%;font-size:14px;min-width:800px;}
    th,td{border-bottom:1px solid #e2e8f0;padding:6px 4px;text-align:center;}
    th{background:#f1f5f9;font-size:12px;position:sticky;top:0;z-index:2;font-weight:700;text-transform:uppercase;color:#475569;}
    td:first-child{text-align:left;}
    .chip{padding:4px 2px;border-radius:6px;border:1px solid #cbd5e1;background:#f1f5f9;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;min-width:28px;margin:0 1px;transition:all 0.1s;}
    .chip.active{transform:scale(1.1);border-width:2px;}
    .chip.ok.active{background:var(--ok);color:#fff;border-color:#558b2f;} 
    .chip.mid.active{background:var(--mid);color:#000;border-color:#fbc02d;}
    .chip.bad.active{background:var(--bad);color:#fff;border-color:#c62828;} 
    .chip.worse.active{background:var(--worse);color:#fff;border-color:#7B1FA2;}
    .chip.dead.active{background:var(--dead);color:#fff;border-color:#000;} 
    .chip.yes.active{background:var(--yes);color:#fff;border-color:#b71c1c;}
    .chip.no.active{background:var(--no);color:#fff;border-color:#33691e;}
    @media (max-width:768px){ .g-3{grid-template-columns:1fr} }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <button class="btn-back" onclick="window.location.href='index.html'"><span>&#8592;</span> Voltar</button>
      <div style="flex:1;overflow:hidden">
        <h1 style="font-size:18px;margin:0">Retigráfico</h1>
        <div style="font-size:12px;color:var(--muted)" id="saveStatus">Status: Sincronizado</div>
      </div>
    </header>

    <div class="card">
      <div style="font-weight:700;margin-bottom:12px">1. Parâmetros & Escopo</div>
      <div class="grid g-3">
        <div><label>Rodovia / UF</label><input id="rodoviaUF" type="text" placeholder="Ex.: BR-040 / MG"></div>
        <div><label>KM Inicial</label><input id="kmStart" type="number"></div>
        <div><label>KM Final</label><input id="kmEnd" type="number"></div>
      </div>
      
      <div class="params-box">
        <div class="check-list" id="checkList">
          <label class="check-row"><input type="checkbox" id="c_rocada3"> 1. Vegetação (1 a 3)</label>
          <label class="check-row"><input type="checkbox" id="c_rocada5"> (Ou Detalhada: 1 a 5)</label>
          <label class="check-row"><input type="checkbox" id="c_drenagem"> 2. Drenagens (1 a 4)</label>
          <label class="check-row"><input type="checkbox" id="c_cata"> 3. Cata-Cata (Lixo)</label>
          <label class="check-row"><input type="checkbox" id="c_poda"> 4. Poda</label>
          <label class="check-row"><input type="checkbox" id="c_entulho"> 5. Recolhimento de Entulho</label>
          <label class="check-row"><input type="checkbox" id="c_defensa"> 6. Defensas Danificadas</label>
          <label class="check-row"><input type="checkbox" id="c_dispositivo"> 7. Dispositivos Danificados</label>
          <label class="check-row"><input type="checkbox" id="c_metragem"> 8. Metragem por Km</label>
          <label class="check-row"><input type="checkbox" id="c_capina"> 9. Capina e Refilamento</label>
        </div>
      </div>
      <div class="row" style="margin-top:16px">
        <button id="btnGerar">Gerar Tabela</button>
        <button id="btnReset" class="ghost warn">Limpar Coleta</button>
      </div>
    </div>

    <div class="card">
      <div style="font-weight:700;margin-bottom:12px">2. Coleta de Campo</div>
      <div class="table-wrap">
        <table id="mainTable">
          <thead id="tableHead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:flex-end">
        <button id="btnExport" class="ghost">Baixar Relatório (XLSX)</button>
      </div>
    </div>
  </div>

  <div id="resetModal" class="modal-back hidden">
    <div class="modal-card">
      <h3>⚠️ Limpar dados da coleta?</h3>
      <p style="font-size:13px; color:var(--muted)">Isso apagará apenas os registros de campo. O escopo e KMs serão mantidos.</p>
      <div style="display:flex;flex-direction:column;gap:10px; margin-top:16px">
        <button id="btnConfirmReset" class="danger">Limpar Tudo</button>
        <button onclick="document.getElementById('resetModal').classList.add('hidden')" class="ghost">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    // Configuração dos Níveis e Chips
    const O_3 = [{v:1,l:'Bom',c:'ok'},{v:2,l:'Reg',c:'mid'},{v:3,l:'Cri',c:'bad'}];
    const O_4 = [{v:1,l:'Bom',c:'ok'},{v:2,l:'Reg',c:'mid'},{v:3,l:'Rui',c:'worse'},{v:4,l:'Cri',c:'bad'}];
    const O_5 = [{v:1,l:'Bom',c:'ok'},{v:2,l:'Reg',c:'mid'},{v:3,l:'Ate',c:'worse'},{v:4,l:'Rui',c:'bad'},{v:5,l:'Cri',c:'dead'}];
    const O_YN= [{v:'S',l:'Sim',c:'yes'},{v:'N',l:'Não',c:'no'}];

    // Matriz compacta das Disciplinas Ativas (Facilita renderização)
    const COLS = [
      {id:'rocada', label:'Vegetação', opts: s => s.config.rocada === '1-5' ? O_5 : O_3, act: s => s.config.rocada !== 'none'},
      {id:'drenagem', label:'Drenagem', opts: () => O_4, act: s => s.config.drenagem},
      {id:'cata', label:'Cata-Cata', opts: () => O_YN, act: s => s.config.cata},
      {id:'poda', label:'Poda', opts: () => O_YN, act: s => s.config.poda},
      {id:'entulho', label:'Entulho', opts: () => O_YN, act: s => s.config.entulho},
      {id:'defensa', label:'Defensa', opts: () => O_YN, act: s => s.config.defensa},
      {id:'dispositivo', label:'Dispositivo', opts: () => O_YN, act: s => s.config.dispositivo},
      {id:'metragem', label:'Metragem', isInput: true, act: s => s.config.metragem},
      {id:'capina', label:'Capina', opts: () => O_4, act: s => s.config.capina}
    ];

    // Lógica principal de Estado e Recuperação de URL
    let currentId = new URLSearchParams(window.location.search).get('id');
    const isNew = new URLSearchParams(window.location.search).get('new');
    
    let state = {
      kmStart:'', kmEnd:'', rodoviaUF:'', data:{},
      config:{rocada:'none', drenagem:false, cata:false, poda:false, entulho:false, defensa:false, dispositivo:false, metragem:false, capina:false}
    };

    if(isNew) {
      localStorage.removeItem('ret_temp_autosave');
      currentId = null;
    } else {
      let saved = localStorage.getItem(currentId || 'ret_temp_autosave');
      if(saved) state = JSON.parse(saved);
    }

    // Auto-Save de Segurança em qualquer momento e ao fechar a aba
    function saveState() {
      state.rodoviaUF = document.getElementById('rodoviaUF').value;
      state.kmStart = document.getElementById('kmStart').value;
      state.kmEnd = document.getElementById('kmEnd').value;
      localStorage.setItem(currentId || 'ret_temp_autosave', JSON.stringify(state));
      
      const stEl = document.getElementById('saveStatus');
      stEl.innerText = 'Salvo: ' + new Date().toLocaleTimeString();
      stEl.style.color = 'var(--ok)';
    }
    
    window.addEventListener('beforeunload', saveState);

    function initUI() {
      document.getElementById('rodoviaUF').value = state.rodoviaUF;
      document.getElementById('kmStart').value = state.kmStart;
      document.getElementById('kmEnd').value = state.kmEnd;
      
      document.getElementById('c_rocada3').checked = state.config.rocada === '1-3';
      document.getElementById('c_rocada5').checked = state.config.rocada === '1-5';
      
      ['drenagem','cata','poda','entulho','defensa','dispositivo','metragem','capina'].forEach(k => {
        document.getElementById('c_'+k).checked = state.config[k];
      });
      renderTable();
    }

    // Listener Unificado para os Checkboxes
    document.getElementById('checkList').addEventListener('change', e => {
      const id = e.target.id.replace('c_','');
      if(id === 'rocada3') state.config.rocada = e.target.checked ? '1-3' : 'none';
      else if(id === 'rocada5') state.config.rocada = e.target.checked ? '1-5' : 'none';
      else state.config[id] = e.target.checked;
      
      if(id === 'rocada3' && e.target.checked) document.getElementById('c_rocada5').checked = false;
      if(id === 'rocada5' && e.target.checked) document.getElementById('c_rocada3').checked = false;
      
      saveState();
      renderTable();
    });

    document.getElementById('btnGerar').onclick = () => { saveState(); renderTable(); };
    document.getElementById('btnReset').onclick = () => document.getElementById('resetModal').classList.remove('hidden');
    
    // Botão Limpar Esvazia Apenas o preenchimento de campo
    document.getElementById('btnConfirmReset').onclick = () => {
      state.data = {};
      saveState();
      renderTable();
      document.getElementById('resetModal').classList.add('hidden');
    };

    function renderTable() {
      const th = document.getElementById('tableHead');
      const tb = document.getElementById('tbody');
      
      let start = parseInt(state.kmStart);
      let end = parseInt(state.kmEnd);
      
      if(isNaN(start) || isNaN(end)) {
        th.innerHTML = ''; 
        tb.innerHTML = '<tr><td style="color:var(--muted)">Preencha os KMs e as disciplinas e clique em Gerar Tabela.</td></tr>';
        return;
      }
      
      // Auto inversão se iniciar com KM Maior e Final Menor
      if(start > end) { let temp = start; start = end; end = temp; }

      let activeCols = COLS.filter(c => c.act(state));
      th.innerHTML = `<tr><th>KM</th>${activeCols.map(c => `<th>${c.label}</th>`).join('')}</tr>`;

      let html = '';
      for(let km = start; km <= end; km++) {
        html += `<tr><td><b>${km}</b></td>`;
        activeCols.forEach(c => {
          let val = state.data[`${km}_${c.id}`] || '';
          if(c.isInput) {
            html += `<td><input type="number" value="${val}" onchange="setCellData('${km}','${c.id}',this.value)" style="width:70px;padding:6px;text-align:center;"></td>`;
          } else {
            html += `<td>${c.opts(state).map(o => `<div class="chip ${o.c} ${val == o.v ? 'active' : ''}" onclick="setCellData('${km}','${c.id}','${o.v}')">${o.l}</div>`).join('')}</td>`;
          }
        });
        html += `</tr>`;
      }
      tb.innerHTML = html;
    }

    window.setCellData = function(km, id, val) {
      const key = `${km}_${id}`;
      // Alternância do clique (toggle liga/desliga)
      if(state.data[key] == val) delete state.data[key];
      else state.data[key] = val;
      
      saveState();
      renderTable();
    }

    document.getElementById('btnExport').onclick = () => {
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.table_to_sheet(document.getElementById("mainTable"));
      XLSX.utils.book_append_sheet(wb, ws, "Coleta");
      XLSX.writeFile(wb, `Retigrafico_${state.rodoviaUF || 'SemNome'}.xlsx`);
    };

    initUI();
  </script>
</body>
</html>
