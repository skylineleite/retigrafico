<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Retigráfico - AutoSave</title>
  <link rel="manifest" href="manifest.webmanifest?v=8">
  <meta name="theme-color" content="#f8fafc">
  
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  
  <style>
    :root{
      --ok:#8BC34A; --mid:#FFEB3B; --warn:#f97316; --bad:#F44336; --worse:#9C27B0; --dead:#212121;
      --yes:#F44336; --no:#8BC34A;
      --ink:#020617; --muted:#64748b; --brand:#0ea5e9; --bg:#f8fafc; --card:#ffffff; --radius:16px;
    }
    *{box-sizing:border-box} 
    body{font-family:system-ui,sans-serif;margin:0;background:var(--bg);color:var(--ink);padding-bottom:40px;}
    .wrap{max-width:1200px;margin:18px auto;padding:0 12px}
    header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;}
    .btn-back{background:transparent;border:1px solid #cbd5e1;color:var(--muted);padding:8px 12px;border-radius:10px;font-weight:600;cursor:pointer;}
    .card{background:var(--card);border-radius:var(--radius);box-shadow:0 4px 6px -1px rgba(0,0,0,0.05);padding:16px;border:1px solid #e2e8f0;margin-bottom:12px;}
    .grid{display:grid;gap:10px} .g-3{grid-template-columns:repeat(3,1fr)}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
    input,button,select{padding:12px;border-radius:12px;border:1px solid #cbd5e1;font-size:16px;outline:none;}
    input[type=number],input[type=text],select{width:100%;}
    input[type=checkbox], input[type=radio]{width:20px;height:20px;accent-color:var(--brand);cursor:pointer;}
    button{background:var(--brand);color:#fff;border:none;cursor:pointer;font-weight:600;}
    button.ghost{background:#fff;color:var(--brand);border:1px solid var(--brand);}
    button.warn{background:#fff;color:#d97706;border:1px solid #d97706;}
    button.danger{background:#fee2e2;color:#ef4444;border:1px solid #ef4444;}
    .params-box{background:#f1f5f9;padding:16px;border-radius:12px;margin-top:10px;}
    .check-list{display:flex;flex-direction:column;gap:12px;}
    .check-row{display:flex;align-items:center;gap:10px;cursor:pointer;padding:4px 0;font-weight:500;}
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:100;}
    .modal-card{background:#fff;padding:24px;border-radius:16px;width:340px;text-align:center;}
    .hidden{display:none;}
    
    .table-wrap{max-height:600px;overflow:auto;border-radius:12px;border:1px solid #e2e8f0;margin-top:12px;}
    /* Tabela agora distribui melhor o espaço e permite quebras de linha naturais */
    table{border-collapse:separate;border-spacing:0;width:100%;font-size:14px;}
    th,td{border-bottom:1px solid #e2e8f0;padding:6px 8px;text-align:center; vertical-align:middle;}
    th{background:#e2e8f0;font-size:12px;position:sticky;top:0;z-index:2;font-weight:700;text-transform:uppercase;color:#334155;}
    td:first-child{text-align:center;}
    .chip{padding:4px 4px;border-radius:6px;border:1px solid #cbd5e1;background:#f8fafc;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;min-width:30px;justify-content:center;margin:2px 1px;transition:all 0.1s;}
    .chip
