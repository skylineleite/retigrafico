<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>Retigráfico - Meus Arquivos</title>
  <link rel="manifest" href="manifest.webmanifest?v=2">
  <meta name="theme-color" content="#00693e">
  <style>
    :root{--brand:#0ea5e9;--bg:#f8fafc;--card:#ffffff;--ink:#0f172a;--muted:#64748b;--radius:16px;}
    body{font-family:system-ui,sans-serif;margin:0;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;min-height:100vh;padding:20px;}
    .container{width:100%;max-width:600px;margin:0 auto;}
    .header-home{display:flex;align-items:center;gap:12px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #e2e8f0;}
    .header-home img{width:50px;height:50px;border-radius:12px;}
    .header-home h1{font-size:20px;margin:0;}
    .header-home p{margin:0;font-size:13px;color:var(--muted);}
    .btn-new{width:100%;background:var(--brand);color:#fff;padding:18px;border-radius:var(--radius);border:none;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:30px;}
    .section-title{font-size:14px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
    .file-list{display:flex;flex-direction:column;gap:12px;}
    .file-card{background:var(--card);border-radius:12px;padding:16px;border:1px solid #e2e8f0;display:flex;flex-direction:column;gap:12px;}
    .file-header{display:flex;justify-content:space-between;align-items:flex-start;}
    .file-date{font-size:11px;color:var(--muted);background:#f1f5f9;padding:2px 8px;border-radius:4px;font-weight:600;}
    .file-name{font-size:16px;font-weight:700;margin-top:6px;}
    .file-kms{font-size:13px;color:var(--muted);margin-top:2px;}
    .file-actions{display:flex;gap:8px;border-top:1px solid #f1f5f9;padding-top:12px;}
    .btn-card{flex:1;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
    .btn-open{background:#e0f2fe;color:#0369a1;}
    .btn-del{background:#fee2e2;color:#b91c1c;flex:0 0 40px;}
    .empty-state{text-align:center;padding:40px;color:var(--muted);border:1px dashed #cbd5e1;border-radius:var(--radius);}
  </style>
</head>
<body>
  <div class="container">
    <div class="header-home">
      <img src="app-logo.png" alt="Logo">
      <div><h1>Retigráfico</h1><p>Gerenciador de Coletas</p></div>
    </div>
    <button class="btn-new" onclick="createNew()">+ Novo Retigráfico</button>
    
    <div class="section-title">Histórico de Arquivos</div>
    <div id="fileList" class="file-list"></div>
  </div>

  <script>
    const INDEX_KEY = 'retigrafico_index_v1';

    function getFiles(){ return JSON.parse(localStorage.getItem(INDEX_KEY) || '[]'); }
    
    function renderList(){
      const list = getFiles();
      const c = document.getElementById('fileList');
      
      if(!list.length) return c.innerHTML = '<div class="empty-state">Nenhum retigráfico salvo.</div>';
      
      c.innerHTML = list.map(f => `
        <div class="file-card">
          <div class="file-header">
            <div>
              <div class="file-date">${new Date(f.date).toLocaleDateString()}</div>
              <div class="file-name">${f.name || 'Sem Nome'}</div>
              <div class="file-kms">${f.rodovia || ''} (Km ${f.kmStart || 0} ao ${f.kmEnd || 0})</div>
            </div>
          </div>
          <div class="file-actions">
            <button class="btn-card btn-open" onclick="window.location.href='app.html?id=${f.id}'">Abrir</button>
            <button class="btn-card btn-del" onclick="deleteFile('${f.id}')">✕</button>
          </div>
        </div>
      `).join('');
    }

    function createNew(){ window.location.href='app.html?new=true'; }
    
    function deleteFile(id){
      if(!confirm('Apagar permanentemente este retigráfico?')) return;
      localStorage.setItem(INDEX_KEY, JSON.stringify(getFiles().filter(f => f.id !== id)));
      localStorage.removeItem(id);
      renderList();
    }

    window.addEventListener('load', renderList);
  </script>
</body>
</html>
